name: Deploy Salamia spike to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/godot-political-game-dDIJI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, queue any new pushes.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Export Godot HTML5 build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Godot project (Web preset)
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          # Honour the path declared in export_presets.cfg (build/web/index.html)
          # so the next step finds the build at the expected location.
          use_preset_export_path: true
          cache: true

      - name: Stage the build into ./public for Pages
        run: |
          # The firebelley action exports to build/<preset_name>/ — our preset
          # is "Web" so files land at build/Web/. Move everything into a flat
          # ./public/ so Pages serves index.html at the site root.
          mkdir -p public
          set -x
          find build -maxdepth 3 -type d
          if [ -d build/Web ]; then cp -r build/Web/. public/; fi
          if [ -d build/web ]; then cp -r build/web/. public/; fi
          touch public/.nojekyll
          ls -la public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
