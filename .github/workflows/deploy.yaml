name: Deploy Salamia spike to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/godot-political-game-dDIJI
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, queue any new pushes.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Export Godot HTML5 build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export Godot project (Web preset)
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          # Honour the path declared in export_presets.cfg (build/web/index.html)
          # so the next step finds the build at the expected location.
          use_preset_export_path: true
          cache: true

      - name: Find the Godot export and stage as the Pages site root
        run: |
          set -x
          # firebelley/godot-export drops files under build/<preset_name>/
          # regardless of the export_path in export_presets.cfg — preset name
          # is "Web", so files end up at build/Web/. Find the real location
          # robustly and copy it (not its parent) to ./site.
          export_dir=$(find build -maxdepth 2 -type f -name index.html -printf '%h\n' | head -n1)
          echo "Found Godot export at: $export_dir"
          test -n "$export_dir" || (echo "No index.html under build/"; exit 1)
          rm -rf site && mkdir -p site
          cp -a "$export_dir"/. site/
          touch site/.nojekyll
          ls -la site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Publish to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
